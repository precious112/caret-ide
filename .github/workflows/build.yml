name: Build Caret IDE

# Builds the branded Caret desktop IDE (a VSCodium-based fork) for macOS, Linux and
# Windows, bundling the Caret extension (caretAI.caret, pulled from Open VSX) as a
# built-in, and uploads the installers as artifacts / a draft GitHub Release.
#
# This is the only way to produce the Windows installer (Inno Setup is Windows-only and
# cannot be built on macOS). The Caret extension is published to Open VSX separately by
# the extension repo's "Publish Caret to Open VSX" workflow.

on:
    workflow_dispatch:
        inputs:
            caret_version:
                description: "Caret extension version to bundle (from Open VSX). Empty = latest."
                required: false
                default: ""
            release:
                description: "Create a draft GitHub Release with the installers"
                type: boolean
                default: false

permissions:
    contents: write

jobs:
    # Generate the Windows .ico from the Caret logo (needs ImageMagick, not on Windows runners).
    win-icons:
        runs-on: ubuntu-22.04
        steps:
            - uses: actions/checkout@v4
            - name: Install ImageMagick + icoutils
              run: sudo apt-get update && sudo apt-get install -y imagemagick icoutils
            - name: Generate Windows icon
              run: |
                  convert build/caret/caret-logo.png -define icon:auto-resize=256,128,96,64,48,32,24,16 code.ico
            - uses: actions/upload-artifact@v4
              with:
                  name: caret-win-ico
                  path: code.ico

    build:
        needs: win-icons
        strategy:
            fail-fast: false
            matrix:
                include:
                    - { os: macos-14, name: darwin-arm64 }
                    - { os: macos-13, name: darwin-x64 }
                    - { os: ubuntu-22.04, name: linux-x64 }
                    - { os: windows-2022, name: win32-x64 }
        runs-on: ${{ matrix.os }}
        defaults:
            run:
                shell: bash
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Install Linux build prerequisites
              if: runner.os == 'Linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y build-essential g++ libx11-dev libxkbfile-dev \
                    libsecret-1-dev libkrb5-dev fakeroot rpm jq imagemagick icoutils librsvg2-bin

            - name: Install macOS build prerequisites
              if: runner.os == 'macOS'
              run: brew install jq || true

            - name: Install Windows build prerequisites
              if: runner.os == 'Windows'
              run: choco install jq -y

            - name: Download Windows icon
              if: runner.os == 'Windows'
              uses: actions/download-artifact@v4
              with:
                  name: caret-win-ico
            - name: Place Windows icon
              if: runner.os == 'Windows'
              run: cp code.ico src/stable/resources/win32/code.ico

            - name: Fetch Caret extension from Open VSX
              run: |
                  VER="${{ github.event.inputs.caret_version }}"
                  API="https://open-vsx.org/api/caretAI/caret/${VER:-latest}"
                  echo "Resolving Caret vsix from ${API}"
                  URL=$(curl -fsSL "${API}" | node -e 'let s="";process.stdin.on("data",d=>s+=d).on("end",()=>{const j=JSON.parse(s);process.stdout.write(j.files.download)})')
                  echo "Downloading ${URL}"
                  curl -fsSL "${URL}" -o caret.vsix
                  ls -lh caret.vsix

            - name: Build Caret IDE (+ installers)
              env:
                  # Authenticate GitHub release downloads (e.g. @vscode/ripgrep) to avoid
                  # anonymous rate-limit 403s during `npm ci` of the VS Code source.
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  npm_config_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  # Windows: ship the Inno Setup .exe installers + zip; skip the MSI (its WiX
                  # template hardcodes the VSCodium binary name and is only for enterprise GPO).
                  SHOULD_BUILD_MSI: "no"
                  SHOULD_BUILD_MSI_NOUP: "no"
              run: bash ./dev/build.sh -p

            - name: Upload installers
              uses: actions/upload-artifact@v4
              with:
                  name: caret-${{ matrix.name }}
                  path: assets/*
                  if-no-files-found: error

            - name: Attach to draft release
              if: ${{ github.event.inputs.release == 'true' }}
              uses: softprops/action-gh-release@v2
              with:
                  draft: true
                  tag_name: ide-${{ github.run_number }}
                  files: assets/*
